  <style>
    :root {
      --ink:    var(--os-primary);
      --paper:  var(--os-bg);
      --muted:  var(--os-compare-blue);
      --line:   color-mix(in srgb, var(--os-scrim) 11%, var(--os-transparent));
      --navy:   var(--os-primary);
      --c-motor:    var(--os-red);
      --c-festival: var(--os-gold);
      --c-culture:  var(--os-purple);
      --c-music:    var(--os-red);
      --c-nature:   var(--c-climate);
      --c-climate:  #1f7a6d;
      --c-tech:     var(--os-primary);
      --c-wellness: var(--os-compare-green);
      --cont-europe: #2f80ed;
      --cont-north-america: #00a7a7;
      --cont-south-america: #2fa84f;
      --cont-asia: #d9a21b;
      --cont-africa: #c75b2c;
      --cont-oceania: #8b5cf6;
      --cont-global: var(--muted);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, Helvetica, sans-serif; color: var(--ink); background: var(--paper); }
    a { color: inherit; text-decoration: none; }

    /* nav */
    .event-nav { position: sticky; top: 0; z-index: 6; display: flex; gap: 8px; align-items: center; padding: 8px clamp(14px,3vw,36px); background: color-mix(in srgb, var(--os-surface) 97%, var(--os-transparent)); border-bottom: 1px solid var(--line); backdrop-filter: blur(12px); }
    .nav-spacer { flex: 1; }
    .nav-language { position: relative; }
    .nav-language summary { display: inline-flex; align-items: center; justify-content: center; min-height: 36px; padding: 0 11px; color: var(--muted); background: var(--os-surface); border: 1px solid var(--line); border-radius: 999px; cursor: pointer; font-size: 12px; font-weight: 900; list-style: none; }
    .nav-language summary::-webkit-details-marker { display: none; }
    .nav-language__list { position: fixed; top: 58px; right: clamp(14px,3vw,36px); z-index: 1002; display: grid; gap: 6px; min-width: 180px; padding: 8px; background: color-mix(in srgb, var(--os-surface) 98%, var(--os-transparent)); border: 1px solid var(--line); border-radius: 8px; box-shadow: 0 14px 34px color-mix(in srgb, var(--os-scrim) 16%, var(--os-transparent)); }
    .nav-language__list a { display: block; padding: 9px 11px; border-radius: 999px; color: var(--ink); font-size: 13px; font-weight: 900; }
    .nav-language__list a:hover { color: var(--os-surface); background: var(--navy); }

    .event-language-list { display: inline-flex; align-items: center; gap: 2px; flex: 0 0 auto; margin-left: auto; padding-left: 8px; }
    .event-language-list span { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; }
    .event-language-list a { display: inline-grid; place-items: center; min-width: 22px; height: 22px; padding: 0 4px; border-radius: 999px; background: var(--os-transparent); color: var(--muted); font-size: 9px; line-height: 1; font-weight: 900; letter-spacing: .03em; }
    .event-language-list a:hover { background: var(--os-bg); color: var(--ink); }
    .event-language-list a[aria-current="true"] { background: var(--navy); color: var(--os-surface); }
/* hero */
    .hero {
      position: relative;
      display: block;
      padding: 12px clamp(20px,5vw,80px);
      color: var(--ink);
      background: var(--os-surface);
      border-bottom: 1px solid var(--line);
    }
    .hero-content { max-width: none; }
    .hero-kicker { display: inline-flex; align-items: center; margin-bottom: 2px; color: var(--accent); font-size: 12px; font-weight: 900; letter-spacing: .12em; text-transform: uppercase; }
    .hero h1 { display: none; }
    .hero p { margin: 6px 0 0; max-width: 720px; color: var(--muted); font-size: 15px; line-height: 1.45; opacity: 1; }
    .event-view-switcher { position: sticky; top: 53px; z-index: 5; display: flex; gap: 8px; align-items: center; padding: 8px clamp(20px,5vw,80px); background: color-mix(in srgb, var(--os-surface) 96%, var(--os-transparent)); border-bottom: 1px solid var(--line); backdrop-filter: blur(10px); overflow-x: auto; scrollbar-width: none; }
    .event-view-switcher::-webkit-scrollbar { display: none; }
    .event-view-switcher a { display: inline-flex; align-items: center; justify-content: center; min-height: 34px; padding: 0 14px; border: 1px solid var(--line); border-radius: 999px; background: var(--os-surface); color: var(--muted); font-size: 12px; font-weight: 900; white-space: nowrap; }
    .event-view-switcher a:hover, .event-view-switcher a.active { background: var(--navy); border-color: var(--navy); color: var(--os-surface); }

    /* filter panel */
    .filters { position: sticky; top: 102px; z-index: 4; background: var(--os-surface); border-bottom: 1px solid var(--line); box-shadow: 0 2px 8px color-mix(in srgb, var(--os-scrim) 6%, var(--os-transparent)); }
    .filter-toggle-btn {
      display: flex; width: 100%; justify-content: space-between; align-items: center;
      padding: 11px clamp(20px,5vw,80px); border: none; background: var(--os-surface);
      font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer;
      color: var(--ink);
    }
    .filter-toggle-main { display: inline-flex; align-items: center; gap: 8px; min-width: 0; }
    .filter-toggle-btn .arrow { transition: transform .2s; display: inline-block; font-style: normal; }
    .filters.open .filter-toggle-btn .arrow { transform: rotate(180deg); }
    .filter-badge { background: var(--navy); color: var(--os-surface); font-size: 10px; font-weight: 800;
      padding: 2px 7px; border-radius: 999px; margin-left: 6px; display: none; }
    .filter-badge.visible { display: inline; }
    .browser-language-label { font-size: 11px; color: var(--muted); align-self: center; margin-left: 2px; }
    .browser-language-label strong { color: var(--ink); font-weight: 800; }
    .filter-rows { display: none; }
    .filters.open .filter-rows { display: block; }
    .filters:not(.open) > .filter-row { display: none; }
    .filters.open > .filter-row { display: flex; }
    .filter-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; padding: 9px clamp(20px,5vw,80px); border-bottom: 1px solid var(--line); }
    .filter-row:last-child { border-bottom: none; }
    .filter-row.hidden { display: none; }
    .filter-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); flex: 0 0 64px; }
    .title-search { flex: 1 1 240px; min-width: min(100%, 220px); border: 1px solid var(--line); border-radius: 999px; background: var(--os-surface); color: var(--ink); font: 700 13px Arial, Helvetica, sans-serif; padding: 8px 13px; outline: none; }
    .title-search:focus { border-color: var(--navy); background: var(--os-surface); box-shadow: 0 0 0 3px color-mix(in srgb, var(--os-scrim) 12%, var(--os-transparent)); }
    .clear-search, .reset-filters { border: 1px solid var(--line); background: var(--os-surface); color: var(--muted); font-size: 12px; font-weight: 800; padding: 7px 12px; border-radius: 999px; cursor: pointer; font-family: inherit; }
    .clear-search:hover, .reset-filters:hover { background: var(--os-bg); color: var(--ink); }
    .clear-search[hidden] { display: none; }
    .reset-filters { margin-left: auto; padding: 6px 10px; font-size: 11px; }
    .filter-btn { border: none; background: var(--os-bg); color: var(--muted); font-size: 12px; font-weight: 600; padding: 6px 13px; border-radius: 999px; cursor: pointer; font-family: inherit; transition: background .12s, color .12s; white-space: nowrap; }
    .filter-btn:hover { background: var(--os-soft); color: var(--ink); }
    .filter-btn.active { background: var(--navy); color: var(--os-surface); }
    .filter-btn:disabled { opacity: .28; cursor: not-allowed; }
    .filter-btn__flag { width: 18px; height: 12px; object-fit: cover; border-radius: 2px; box-shadow: 0 0 0 1px color-mix(in srgb, var(--os-scrim) 12%, var(--os-transparent)); }
    .filter-btn--country { display: inline-flex; align-items: center; gap: 7px; }
    .filter-btn[data-cat="motor"].active    { background: var(--c-motor); }
    .filter-btn[data-cat="sport"].active    { background: var(--c-sport); }
    .filter-btn[data-cat="festival"].active { background: var(--c-festival); }
    .filter-btn[data-cat="culture"].active  { background: var(--c-culture); }
    .filter-btn[data-cat="music"].active    { background: var(--c-music); }
    .filter-btn[data-cat="nature"].active   { background: var(--c-nature); }
    .filter-btn[data-cat="climate"].active  { background: var(--c-climate); }
    .filter-btn[data-cat="tech"].active     { background: var(--c-tech); }
    .filter-btn[data-cat="wellness"].active { background: var(--c-wellness); }
    .filter-btn[data-cont="europe"].active { background: var(--cont-europe); }
    .filter-btn[data-cont="north-america"].active { background: var(--cont-north-america); }
    .filter-btn[data-cont="south-america"].active { background: var(--cont-south-america); }
    .filter-btn[data-cont="asia"].active { background: var(--cont-asia); }
    .filter-btn[data-cont="africa"].active { background: var(--cont-africa); }
    .filter-btn[data-cont="oceania"].active { background: var(--cont-oceania); }
    #topic-row   { display: none; } #topic-row:not(.hidden)   { display: flex; }
    #country-row { display: none; } #country-row:not(.hidden) { display: flex; }

    /* #location-row and #reach-row are direct children of .filters too,
       so they collapse together with the rest when the panel is closed. */

    /* main grid */
    .events-wrap { padding: 28px clamp(20px,5vw,80px) 48px; display: grid; gap: 32px; }
    .year-section { display: grid; gap: 18px; }
    .year-section.hidden { display: none; }
    .year-header { display: flex; align-items: center; gap: 12px; }
    .year-toggle { display: inline-flex; align-items: center; gap: 8px; border: 1px solid var(--line); background: var(--os-surface); color: var(--ink); border-radius: 999px; padding: 8px 14px; font-family: inherit; font-size: 14px; font-weight: 900; cursor: pointer; box-shadow: 0 2px 8px color-mix(in srgb, var(--os-scrim) 5%, var(--os-transparent)); }
    .year-toggle::before { content: '-'; display: inline-grid; place-items: center; width: 18px; height: 18px; border-radius: 999px; background: var(--navy); color: var(--os-surface); font-size: 13px; line-height: 1; }
    .year-section.is-collapsed .year-toggle::before { content: '+'; }
    .year-line { flex: 1; height: 1px; background: var(--line); }
    .year-months { display: grid; gap: 32px; }
    .year-section.is-collapsed .year-months { display: none; }
    .month-section { display: grid; gap: 12px; }
    .month-header { display: flex; align-items: center; gap: 12px; }
    .month-title { font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); white-space: nowrap; }
    .month-line { flex: 1; height: 1px; background: var(--line); }
    .events-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px,1fr)); gap: 10px; }

    /* event card */
    .event-card { position: relative; background: var(--os-surface); border: 1px solid var(--line); border-radius: 9px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 2px 8px color-mix(in srgb, var(--os-scrim) 5%, var(--os-transparent)); transition: transform .12s, box-shadow .12s; }
    .event-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px color-mix(in srgb, var(--os-scrim) 10%, var(--os-transparent)); }
    .event-card[data-reach="global"]    { border-left: 4px solid var(--os-compare-blue); }
    .event-card[data-reach="continent"] { border-left: 4px solid var(--os-gold); }
    .event-card[data-reach="national"]  { border-left: 4px solid var(--os-accent); }
    .event-card[data-reach="global"]    .card-meta::after { content: 'Global';    color: var(--os-compare-blue); font-size: 10px; font-weight: 700; margin-left: 6px; }
    .event-card[data-reach="continent"] .card-meta::after { content: 'Continent'; color: var(--os-gold); font-size: 10px; font-weight: 700; margin-left: 6px; }
    .event-card[data-reach="national"]  .card-meta::after { content: 'National';  color: var(--os-accent); font-size: 10px; font-weight: 700; margin-left: 6px; }
    .card-stripe { height: 4px; background: var(--cat-color, var(--os-card-accent)); }
    .card-body { padding: 12px 14px 13px; display: flex; flex-direction: column; gap: 5px; flex: 1; }
    .cat-pill { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .05em; color: var(--cat-color, var(--os-card-accent)); background: color-mix(in srgb, var(--cat-color, var(--os-card-accent)) 10%, var(--os-surface)); padding: 3px 8px; border-radius: 999px; align-self: flex-start; }
    .card-title { font-size: 15px; font-weight: 700; line-height: 1.25; }
    .card-meta { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; font-size: 12px; color: var(--muted); margin-top: auto; padding-top: 4px; }
    .event-card[style*="--country-flag"] .card-meta::before {
      content: "";
      flex: 0 0 auto;
      width: 18px;
      height: 12px;
      background: var(--country-flag) center / cover no-repeat;
      border-radius: 2px;
      box-shadow: 0 0 0 1px color-mix(in srgb, var(--os-scrim) 12%, var(--os-transparent));
    }

    .card-thumb { width: 100%; height: 110px; object-fit: cover; display: block; border-radius: 6px 6px 0 0; }
    .event-card.hidden { display: none; }
    .month-section.hidden { display: none; }
    .empty-results { display: none; margin: 28px clamp(20px,5vw,80px) 0; padding: 22px; border: 1px dashed var(--line); border-radius: 9px; background: var(--os-surface); color: var(--muted); font-weight: 800; text-align: center; }
    .empty-results.visible { display: block; }

    .site-footer { padding: 14px clamp(20px,5vw,80px); color: var(--muted); font-size: 13px; border-top: 1px solid var(--line); background: var(--os-surface); }

    @media (max-width: 500px) { .events-grid { grid-template-columns: 1fr; } .filter-label { flex: 0 0 auto; } }
  
      .nav-icon{flex:0 0 auto;display:flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:50%;color:var(--muted);text-decoration:none;transition:background .12s,color .12s}
      .nav-icon:hover{background:var(--theme);color:var(--os-surface)}
      .nav-icon svg{width:22px;height:22px;display:block}    
    .top-menu { overflow: visible; }
    .event-language-menu { position: relative; flex: 0 0 auto; margin-left: auto; z-index: 1001; }
    .event-language-menu summary { display: inline-flex; align-items: center; gap: 7px; min-height: 36px; padding: 0 11px; color: var(--event-muted, var(--muted, var(--os-compare-blue))); background: var(--os-surface); border: 1px solid var(--event-line, var(--line, color-mix(in srgb, var(--os-scrim) 11%, var(--os-transparent)))); border-radius: 999px; cursor: pointer; font-size: 12px; font-weight: 900; list-style: none; }
    .event-language-menu summary::-webkit-details-marker { display: none; }
    .event-language-menu summary svg { width: 17px; height: 17px; }
    .event-language-menu[open] summary, .event-language-menu summary:hover { color: var(--os-surface); background: var(--event-theme, var(--navy, var(--theme, var(--os-primary)))); border-color: var(--event-theme, var(--navy, var(--theme, var(--os-primary)))); }
    .event-language-menu .event-language-list { position: fixed; top: 58px; right: clamp(14px, 3vw, 36px); z-index: 1002; display: grid; grid-template-columns: 1fr; gap: 6px; min-width: 230px; max-width: min(300px, calc(100vw - 24px)); margin: 0; padding: 8px; background: color-mix(in srgb, var(--os-surface) 98%, var(--os-transparent)); border: 1px solid var(--event-line, var(--line, color-mix(in srgb, var(--os-scrim) 11%, var(--os-transparent)))); border-radius: 8px; box-shadow: 0 14px 34px color-mix(in srgb, var(--os-scrim) 16%, var(--os-transparent)); }
    .event-language-menu .event-language-list > span:first-child { display: none; }
    .event-language-menu .event-language-list a { display: grid; grid-template-columns: 42px 1fr; gap: 9px; align-items: center; min-height: 34px; padding: 0 10px; color: var(--event-muted, var(--muted, var(--os-compare-blue))); background: var(--os-surface); border: 1px solid var(--event-line, var(--line, color-mix(in srgb, var(--os-scrim) 11%, var(--os-transparent)))); border-radius: 999px; font-size: 12px; font-weight: 800; text-decoration: none; }
    .event-language-menu .event-language-list a[aria-current="true"], .event-language-menu .event-language-list a:hover { color: var(--os-surface); background: var(--event-theme, var(--navy, var(--theme, var(--os-primary)))); border-color: var(--event-theme, var(--navy, var(--theme, var(--os-primary)))); }
    .event-language-menu .event-language-list a span { position: static; display: inline; width: auto; height: auto; min-height: 0; padding: 0; overflow: visible; clip: auto; color: inherit; background: var(--os-transparent); border: 0; border-radius: 0; font-size: inherit; font-weight: inherit; letter-spacing: 0; text-transform: none; white-space: nowrap; }

    .events-frame__rail, .events-frame__panel { min-height: 0; overflow: auto; border: 1px solid var(--line); border-radius: 10px; background: color-mix(in srgb, var(--os-surface) 96%, var(--os-transparent)); box-shadow: 0 18px 42px color-mix(in srgb, var(--os-scrim) 10%, var(--os-transparent)); }

    .events-frame__rail .title-search { flex-basis: 100%; min-width: 0; }

    .events-frame__rail .reset-filters { margin-left: 0; }
    .rail-stack { display: grid; gap: 10px; padding: 0 12px 14px; }
    .rail-card { display: grid; gap: 6px; padding: 12px; border: 1px solid var(--line); border-radius: 8px; background: linear-gradient(180deg, var(--os-surface), var(--os-surface)); }
    .rail-card span { color: var(--muted); font-size: 10px; font-weight: 900; letter-spacing: .08em; text-transform: uppercase; }
    .rail-card strong { font-size: 18px; line-height: 1.05; }

    const allCards = () => [...document.querySelectorAll('.event-card')];

    const today = new Date();

    function isCurrentOrUpcoming(card) {
      const end = card.dataset.end || card.dataset.start;
      if (!end) return true;
      const endDate = new Date(end + 'T00:00:00');
      return Number.isNaN(endDate.getTime()) || endDate >= today;
    }

    function normalizeSearch(value) {
      return (value || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim();
    }

    function cardTitle(card) {
      const title = card.querySelector('.card-title');
      return normalizeSearch(title ? title.textContent : '');
    }

    function eventIdentity(card) {
      return (card.getAttribute('href') || '')
        .split('#')[0]
        .split('?')[0]
        .replace(/\/+$/, '');
    }

    function uniqueEventCards(cards) {
      const seen = new Set();
      return cards.filter(card => {
        const key = eventIdentity(card) || cardTitle(card);
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function rootCategory(card) {
      const href = card.getAttribute('href') || '';
      const match = href.match(/(?:^|\/)categories\/([^/]+)\//);
      return match ? match[1] : (card.dataset.cat || 'event');
    }

    function colorVarForCategory(category) {
      const map = {
        sport: 'var(--c-sport)',
        motor: 'var(--c-motor)',
        festival: 'var(--c-festival)',
        culture: 'var(--c-culture)',
        music: 'var(--c-music)',
        climate: 'var(--c-climate)',
        nature: 'var(--c-nature)',
        food: 'var(--c-food)',
        drinks: 'var(--c-drinks)',
        technology: 'var(--c-tech)',
        tech: 'var(--c-tech)',
        wellness: 'var(--c-wellness)'
      };
      return map[category] || 'var(--navy)';
    }

    function syncCardColors() {
      allCards().forEach(card => {
        const ownCategory = card.dataset.cat || 'event';
        const colorKey = activeRootCat !== 'all' ? rootCategory(card) : ownCategory;
        if (colorKey === ownCategory) {
          card.style.removeProperty('--cat-color');
          card.style.removeProperty('--os-card-accent');
          return;
        }
        const color = colorVarForCategory(colorKey);
        card.style.setProperty('--cat-color', color);
        card.style.setProperty('--os-card-accent', color);
      });

    function collectLooseEventCards() {
      const wrap = document.querySelector('.events-wrap');
      if (!wrap) return;
      const looseCards = Array.from(document.querySelectorAll('.events-frame > .event-card, main > .event-card'));
      if (!looseCards.length) return;
      let section = wrap.querySelector('[data-year-section="9999"] .events-grid');
      if (!section) {
        const yearSection = document.createElement('section');
        yearSection.className = 'year-section';
        yearSection.dataset.yearSection = '9999';
        yearSection.innerHTML = '<div class="year-header"><button class="year-toggle" type="button" aria-expanded="true">unscheduled</button><span class="year-line"></span></div><div class="year-months"><section class="month-section" id="m999900"><div class="month-header"><span class="month-title">Unscheduled</span><span class="month-line"></span></div><div class="events-grid"></div></section></div>';
        wrap.appendChild(yearSection);

    function railContinent(card) {
      const raw = card.dataset.cont || 'global';

      if (card.dataset.year) return card.dataset.year;
      const start = card.dataset.start || '';
      return /^\d{4}/.test(start) ? start.slice(0, 4) : '9999';
    }

    function yearLabel(year) {
      return year === '9999' ? 'unknown' : year;

    function matches(card, overrides = {}) {
      const cat     = overrides.cat     !== undefined ? overrides.cat     : activeCat;
      const topic   = overrides.topic   !== undefined ? overrides.topic   : activeTopic;
      const cont    = overrides.cont    !== undefined ? overrides.cont    : activeCont;
      const rootCat = overrides.rootCat !== undefined ? overrides.rootCat : activeRootCat;
      const railCont = overrides.railCont !== undefined ? overrides.railCont : activeRailCont;
      const country = overrides.country !== undefined ? overrides.country : activeCountry;
      const year    = overrides.year    !== undefined ? overrides.year    : activeYear;
      const reach = overrides.reach !== undefined ? overrides.reach : activeReach;
      const imageStatus = overrides.imageStatus !== undefined ? overrides.imageStatus : activeImageStatus;
      const dateStatus = overrides.dateStatus !== undefined ? overrides.dateStatus : activeDateStatus;
      const stayStatus = overrides.stayStatus !== undefined ? overrides.stayStatus : activeStayStatus;
      const search = overrides.search !== undefined ? normalizeSearch(overrides.search) : activeSearch;
      const locOn = overrides.locationOn !== undefined ? overrides.locationOn : locationOn;
      const cardStay = card.dataset.stay || 'unknown';
      const cardReach = card.dataset.reach || 'global';
      const levelOk = reach === 'all'
        || cardReach === reach
        || (reach === 'timezone' && userCountry && card.dataset.country === userCountry);
      const locationOk = !locOn
        || cardReach === 'global'
        || (cardReach === 'continent' && userContinent && card.dataset.cont === userContinent)
        || (cardReach === 'national'  && userCountry  && card.dataset.country === userCountry);
      const reachOk = levelOk && locationOk;
      return isCurrentOrUpcoming(card)
          && (year === 'all' || eventYearValue(card) === year)
          && reachOk
          && (rootCat === 'all' || rootCategory(card) === rootCat)
          && (railCont === 'all' || railContinent(card) === railCont)
          && (cat     === 'all' || card.dataset.cat     === cat)
          && (topic   === 'all' || card.dataset.topic   === topic)
          && (cont    === 'all' || card.dataset.cont    === cont)
          && (country === 'all' || card.dataset.country === country)
          && (imageStatus === 'all' || (imageStatus === 'not-fake' ? card.dataset.imageStatus !== 'fake' : card.dataset.imageStatus === imageStatus))
          && (dateStatus === 'all' || (dateStatus === 'not-set' && card.dataset.officialDate === 'false') || card.dataset.dateStatus === dateStatus)
          && (stayStatus === 'all' || (stayStatus === 'has-stay' && cardStay === 'true') || (stayStatus === 'no-stay' && cardStay === 'false'))
          && (!search || cardTitle(card).includes(search));
    }

    function applyFilters() {
      collectLooseEventCards();

      allCards().forEach(c => c.classList.toggle('hidden', !matches(c)));

    function updateRailVisuals() {
      const visible = allCards().filter(card => !card.classList.contains('hidden'));
      const total = document.getElementById('rail-total-count');
      const bars = document.getElementById('rail-category-bars');
      const continentBars = document.getElementById('rail-continent-bars');
      const list = document.getElementById('rail-year-list');
      if (!total || !bars || !continentBars || !list) return;
      const distinctVisible = uniqueEventCards(visible);
      total.textContent = distinctVisible.length + ' event' + (distinctVisible.length === 1 ? '' : 's');
      const color = {
        sport:'var(--c-sport)',
        motor:'var(--c-motor)',
        festival:'var(--c-festival)',
        culture:'var(--c-culture)',
        music:'var(--c-music)',
        climate:'var(--c-climate)',
        nature:'var(--c-nature)',
        technology:'var(--c-tech)',
        tech:'var(--c-tech)',
        wellness:'var(--c-wellness)'

        europe:'var(--cont-europe)',
        'north-america':'var(--cont-north-america)',

        africa:'var(--cont-africa)',

        global:'var(--cont-global)'
      };
      const categoryScope = uniqueEventCards(allCards().filter(card => matches(card, { rootCat: 'all' })));
      const counts = categoryScope.reduce((map, card) => {
        const cat = rootCategory(card);
        map.set(cat, (map.get(cat) || 0) + 1);
        return map;
      }, new Map());
      const top = [...counts.entries()].sort((a,b) => b[1] - a[1]);
      const max = top.reduce((m, item) => Math.max(m, item[1]), 1);
      bars.replaceChildren(...top.map(([cat, countValue]) => {
        const row = document.createElement('button');
        row.type = 'button';
        row.className = 'rail-bar';
        row.dataset.railRootCat = cat;
        row.classList.toggle('active', activeRootCat === cat);
        row.setAttribute('aria-pressed', String(activeRootCat === cat));
        row.innerHTML = '<span>' + titleCaseSlug(cat) + '</span><i class="rail-bar__track"><b class="rail-bar__fill"></b></i><strong>' + countValue + '</strong>';
        row.querySelector('.rail-bar__fill').style.setProperty('--bar', Math.max(10, Math.round(countValue / max * 100)) + '%');
        row.querySelector('.rail-bar__fill').style.setProperty('--bar-color', color[cat] || 'var(--navy)');
        row.addEventListener('click', () => {
          activeRootCat = activeRootCat === cat ? 'all' : cat;
          activeCat = 'all';
          activeTopic = 'all';
          document.querySelectorAll('#cat-row .filter-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === 'all'));
          rebuildTopicRow();
          rebuildCountryRow();
          applyFilters();
        });
        return row;
      }));
      const continentScope = uniqueEventCards(allCards().filter(card => matches(card, { railCont: 'all' })));
      const continentCounts = continentScope.reduce((map, card) => {
        const cont = railContinent(card);
        map.set(cont, (map.get(cont) || 0) + 1);
        return map;
      }, new Map());
      const continentTop = [...continentCounts.entries()].sort((a,b) => b[1] - a[1]);
      const continentMax = continentTop.reduce((m, item) => Math.max(m, item[1]), 1);
      continentBars.replaceChildren(...continentTop.map(([cont, countValue]) => {
        const row = document.createElement('button');
        row.type = 'button';
        row.className = 'rail-bar';
        row.dataset.railCont = cont;
        row.classList.toggle('active', activeRailCont === cont);
        row.setAttribute('aria-pressed', String(activeRailCont === cont));
        row.innerHTML = '<span>' + (cont === 'global' ? 'Global/TBC' : titleCaseSlug(cont)) + '</span><i class="rail-bar__track"><b class="rail-bar__fill"></b></i><strong>' + countValue + '</strong>';
        row.querySelector('.rail-bar__fill').style.setProperty('--bar', Math.max(10, Math.round(countValue / continentMax * 100)) + '%');
        row.querySelector('.rail-bar__fill').style.setProperty('--bar-color', continentColor[cont] || 'var(--navy)');
        row.addEventListener('click', () => {
          activeRailCont = activeRailCont === cont ? 'all' : cont;
          activeCont = 'all';
          activeCountry = 'all';
          document.querySelectorAll('#cont-row .filter-btn').forEach(b => b.classList.toggle('active', b.dataset.cont === 'all'));
          rebuildCountryRow();
          rebuildTopicRow();
          setFiltersOpen(true);
          applyFilters();
        });
        return row;
      }));
      const yearCounts = allCards()
        .filter(card => matches(card, { year: 'all' }))
        .reduce((map, card) => {
          const year = eventYearValue(card);
          map.set(year, (map.get(year) || 0) + 1);
          return map;
        }, new Map());
      list.replaceChildren(...[...yearCounts.entries()].sort((a,b) => {
        return a[0].localeCompare(b[0]);
      }).map(([year, countValue]) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.dataset.railYear = year;
        button.classList.toggle('active', activeYear === year);
        button.innerHTML = '<span>' + yearLabel(year) + '</span><small>' + countValue + ' event' + (countValue === 1 ? '' : 's') + '</small>';
        button.addEventListener('click', () => {
          const filterValue = year;
          const yearButton = document.querySelector('#year-row .filter-btn[data-year="' + filterValue + '"]');
          document.querySelectorAll('#year-row .filter-btn').forEach(b => b.classList.remove('active'));
          if (yearButton) yearButton.classList.add('active');
          activeYear = filterValue;
          rebuildTopicRow();
          rebuildCountryRow();
          applyFilters();
        });
        return button;
      }));
    }
    function refreshStaticRows() {
      // Dim category buttons that yield zero results given current year/topic/cont/country
      document.querySelectorAll('#cat-row .filter-btn').forEach(btn => {
        const v = btn.dataset.cat;
        if (v === 'all') { btn.disabled = false; return; }
        btn.disabled = !allCards().some(c => matches(c, { cat: v }));
      });
      // Dim continent buttons that yield zero results given current year/cat/topic
      document.querySelectorAll('#cont-row .filter-btn').forEach(btn => {
        const v = btn.dataset.cont;
        if (v === 'all') { btn.disabled = false; return; }
        btn.disabled = !allCards().some(c => matches(c, { cont: v, country: 'all' }));
      });

    function rebuildTopicRow() {
      const row = document.getElementById('topic-row');
      if (activeCat === 'all') { row.classList.add('hidden'); activeTopic = 'all'; return; }
      const topics = [...new Set(
        allCards().filter(c => activeCat === 'all' || c.dataset.cat === activeCat)
          .map(c => c.dataset.topic).filter(Boolean).sort()
      )];
      if (!topics.includes(activeTopic)) activeTopic = 'all';
      row.innerHTML = '<span class="filter-label">Topic</span>';
      const allBtn = makeBtn('all', 'All Topics', 'topic');
      if (activeTopic === 'all') allBtn.classList.add('active');
      row.appendChild(allBtn);
      topics.forEach(t => {
        const b = makeBtn(t, topicNames[t] || titleCaseSlug(t), 'topic');
        if (activeTopic === t) b.classList.add('active');
        row.appendChild(b);
      });
      row.classList.remove('hidden');
    }

    function rebuildCountryRow() {
      const row = document.getElementById('country-row');
      if (activeCont === 'all' && activeRailCont === 'all') { row.classList.add('hidden'); activeCountry = 'all'; return; }
      const countries = [...new Set(
        allCards().filter(c => matches(c, { country: 'all' }))
          .map(c => c.dataset.country).filter(Boolean).sort()
      )];
      if (!countries.includes(activeCountry)) activeCountry = 'all';
      row.innerHTML = '<span class="filter-label">Country</span>';
      const allBtn = makeBtn('all', 'All Countries', 'country');
      if (activeCountry === 'all') allBtn.classList.add('active');
      row.appendChild(allBtn);
      countries.forEach(c => {
        const b = makeBtn(c, countryNames[c] || titleCaseSlug(c), 'country');
        if (activeCountry === c) b.classList.add('active');
        row.appendChild(b);
      });
      row.classList.remove('hidden');

    function makeBtn(value, label, type) {
      const b = document.createElement('button');
      b.className = 'filter-btn';
      b.dataset[type] = value;
      if (type === 'country') {
        b.classList.add('filter-btn--country');
        appendCountryButtonContent(b, value, label);
      } else {
        b.textContent = label;
      }
      b.addEventListener('click', () => {
        document.getElementById(
          type === 'topic' ? 'topic-row' : 'country-row'
        ).querySelectorAll('.filter-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        if (type === 'topic')   { activeTopic   = value; rebuildCountryRow(); }
        if (type === 'country') { activeCountry = value; rebuildTopicRow(); }
        applyFilters();
      });
      return b;
    }

    function countryFlagSlug(value) {
      if (value === 'uk') return 'united-kingdom';
      return value;
    }

    function buildCountryFlagPathCache() {
      const paths = new Map();
      allCards().forEach(card => {
        const slug = countryFlagSlug(card.dataset.country || '');
        const cont = card.dataset.cont || '';
        if (!slug || !cont || cont === 'global' || ['all', 'global', 'worldwide', 'tbc'].includes(slug)) return;
        if (!paths.has(slug)) paths.set(slug, '../locations/' + cont + '/' + slug + '/img/flag.svg');
      });
      return paths;
    }

    function countryFlagPath(value) {
      const slug = countryFlagSlug(value);
      if (!slug || ['all', 'global', 'worldwide', 'tbc'].includes(slug)) return '';
      if (!countryFlagPathCache) countryFlagPathCache = buildCountryFlagPathCache();
      return countryFlagPathCache.get(slug) || '';
    }

    function appendCountryButtonContent(button, value, label) {
      const flagPath = countryFlagPath(value);
      if (flagPath) {
        const img = document.createElement('img');
        img.className = 'filter-btn__flag';
        img.src = flagPath;
        img.alt = '';
        img.width = 18;
        img.height = 12;
        img.loading = 'lazy';
        img.decoding = 'async';
        button.appendChild(img);
      }
      const text = document.createElement('span');
      text.textContent = label;
      button.appendChild(text);
    }

    function ensureCardCountryFlagStyle(card) {
      if (!card || card.dataset.countryFlagReady === 'true') return;
      const flagPath = countryFlagPath(card.dataset.country || '');
      card.dataset.countryFlagReady = 'true';
      if (flagPath) card.style.setProperty('--country-flag', 'url("' + flagPath + '")');
    }

    function initLazyCountryFlagStyles() {
      const cards = allCards();
      if (!('IntersectionObserver' in window)) {
        cards.filter(card => !card.classList.contains('hidden')).slice(0, 60).forEach(ensureCardCountryFlagStyle);
        return;
      }
      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (!entry.isIntersecting) return;
          ensureCardCountryFlagStyle(entry.target);
          observer.unobserve(entry.target);
        });
      }, { rootMargin: '260px 0px' });
      cards.forEach(card => observer.observe(card));
    }

    document.querySelectorAll('#year-row .filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#year-row .filter-btn').forEach(b => b.classList.remove('active'));

        activeYear = btn.dataset.year;

      });
    });

    document.querySelectorAll('#cat-row .filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#cat-row .filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeCat = btn.dataset.cat;
        activeRootCat = 'all';
        activeTopic = 'all';
        rebuildTopicRow();
        rebuildCountryRow();
        applyFilters();
      });
    });

    document.querySelectorAll('#cont-row .filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#cont-row .filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeCont = btn.dataset.cont;
        activeRailCont = 'all';
        activeCountry = 'all';
        rebuildCountryRow();
        rebuildTopicRow();
        applyFilters();
      });
    });

    const titleSearchInput = document.getElementById('title-search');
    const clearSearchButton = document.getElementById('clear-search');

    const filterStateKey = 'os_events_index_filter_state_v1';
    const filterParamKeys = ['search', 'year', 'cat', 'rootCat', 'topic', 'cont', 'railCont', 'country', 'reach', 'imageStatus', 'dateStatus', 'stayStatus', 'location'];

    function readFilterStateFromParams(params) {
      return {
        search: params.get('search') || '',
        year: params.get('year') || 'all',
        cat: params.get('cat') || 'all',
        rootCat: params.get('rootCat') || 'all',
        topic: params.get('topic') || 'all',
        cont: params.get('cont') || 'all',
        railCont: params.get('railCont') || 'all',
        country: params.get('country') || 'all',
        reach: params.get('reach') || 'all',
        imageStatus: params.get('imageStatus') || 'all',
        dateStatus: params.get('dateStatus') || 'all',
        stayStatus: params.get('stayStatus') || 'all',
        location: params.get('location') === '1'
      };
    }

    function currentFilterState() {
      return {
        search: titleSearchInput.value.trim(),
        year: activeYear,
        cat: activeCat,
        rootCat: activeRootCat,
        topic: activeTopic,
        cont: activeCont,
        railCont: activeRailCont,
        country: activeCountry,
        reach: activeReach,
        imageStatus: activeImageStatus,
        dateStatus: activeDateStatus,
        stayStatus: activeStayStatus,
        location: locationOn
      };
    }

    function hasActiveFilterState(state) {
      return Boolean(state.search)
        || state.year !== 'all'
        || state.cat !== 'all'
        || state.rootCat !== 'all'
        || state.topic !== 'all'
        || state.cont !== 'all'
        || state.railCont !== 'all'
        || state.country !== 'all'
        || state.reach !== 'all'
        || state.imageStatus !== 'all'
        || state.dateStatus !== 'all'
        || state.stayStatus !== 'all'
        || state.location;
    }

    function applyFilterState(state) {
      activeYear = state.year || 'all';
      activeCat = state.cat || 'all';
      activeRootCat = state.rootCat || 'all';
      activeTopic = state.topic || 'all';
      activeCont = state.cont || 'all';
      activeRailCont = state.railCont || 'all';
      activeCountry = state.country || 'all';
      activeReach = state.reach || 'all';
      activeImageStatus = state.imageStatus || 'all';
      activeDateStatus = state.dateStatus || 'all';
      activeStayStatus = state.stayStatus || 'all';
      activeSearch = normalizeSearch(state.search || '');
      locationOn = Boolean(state.location);
      titleSearchInput.value = state.search || '';
      clearSearchButton.hidden = !activeSearch;
      const locationToggle = document.getElementById('location-toggle');
      if (locationToggle) locationToggle.classList.toggle('active', locationOn);
    }

    function readInitialFilterState() {
      const params = new URLSearchParams(location.search);
      const hasParams = filterParamKeys.some(key => params.has(key));
      if (hasParams) return readFilterStateFromParams(params);
      try {
        const stored = sessionStorage.getItem(filterStateKey);
        return stored ? JSON.parse(stored) : null;
      } catch (error) {
        return null;
      }
    }

    function persistFilterState() {
      const state = currentFilterState();
      const active = hasActiveFilterState(state);
      try {
        if (active) sessionStorage.setItem(filterStateKey, JSON.stringify(state));
        else sessionStorage.removeItem(filterStateKey);
      } catch (error) {}

      const url = new URL(window.location.href);
      filterParamKeys.forEach(key => url.searchParams.delete(key));
      if (state.search) url.searchParams.set('search', state.search);
      if (state.year !== 'all') url.searchParams.set('year', state.year);
      if (state.cat !== 'all') url.searchParams.set('cat', state.cat);
      if (state.rootCat !== 'all') url.searchParams.set('rootCat', state.rootCat);
      if (state.topic !== 'all') url.searchParams.set('topic', state.topic);
      if (state.cont !== 'all') url.searchParams.set('cont', state.cont);
      if (state.railCont !== 'all') url.searchParams.set('railCont', state.railCont);
      if (state.country !== 'all') url.searchParams.set('country', state.country);
      if (state.reach !== 'all') url.searchParams.set('reach', state.reach);
      if (state.imageStatus !== 'all') url.searchParams.set('imageStatus', state.imageStatus);
      if (state.dateStatus !== 'all') url.searchParams.set('dateStatus', state.dateStatus);
      if (state.stayStatus !== 'all') url.searchParams.set('stayStatus', state.stayStatus);
      if (state.location) url.searchParams.set('location', '1');
      history.replaceState(null, '', url.pathname + url.search + url.hash);
    }

    const initialFilterState = readInitialFilterState();
    if (initialFilterState) applyFilterState(initialFilterState);

    titleSearchInput.addEventListener('input', () => {
      activeSearch = normalizeSearch(titleSearchInput.value);
      clearSearchButton.hidden = !activeSearch;
      applyFilters();
    });
    clearSearchButton.addEventListener('click', () => {
      titleSearchInput.value = '';
      activeSearch = '';
      clearSearchButton.hidden = true;
      titleSearchInput.focus();
      applyFilters();
    });

    function setActiveButton(selector, attr, value) {
      document.querySelectorAll(selector).forEach(btn => {
        btn.classList.toggle('active', btn.dataset[attr] === value);
      });
    }

    function syncFilterControlsFromState() {
      setActiveButton('#year-row .filter-btn', 'year', activeYear);
      setActiveButton('#cat-row .filter-btn', 'cat', activeCat);
      setActiveButton('#cont-row .filter-btn', 'cont', activeCont);
      setActiveButton('#reach-row .filter-btn', 'reach', activeReach);
      setActiveButton('#qa-row [data-image-status]', 'imageStatus', activeImageStatus);
      setActiveButton('#qa-row [data-date-status]', 'dateStatus', activeDateStatus);
      setActiveButton('#stay-row [data-stay-status]', 'stayStatus', activeStayStatus);
      const locationToggle = document.getElementById('location-toggle');
      if (locationToggle) locationToggle.classList.toggle('active', locationOn);
    }

    function resetFilters() {
      activeYear = 'all';
      activeCat = 'all';
      activeRootCat = 'all';
      activeTopic = 'all';
      activeCont = 'all';
      activeRailCont = 'all';
      activeCountry = 'all';
      activeReach = 'all';
      activeImageStatus = 'all';
      activeDateStatus = 'all';
      activeStayStatus = 'all';
      activeSearch = '';
      locationOn = false;
      try { sessionStorage.removeItem(filterStateKey); } catch (error) {}

      titleSearchInput.value = '';
      clearSearchButton.hidden = true;
      document.getElementById('location-toggle').classList.remove('active');
      setActiveButton('#year-row .filter-btn', 'year', 'all');
      setActiveButton('#cat-row .filter-btn', 'cat', 'all');
      setActiveButton('#cont-row .filter-btn', 'cont', 'all');
      setActiveButton('#reach-row .filter-btn', 'reach', 'all');
      setActiveButton('#qa-row [data-image-status]', 'imageStatus', 'all');
      setActiveButton('#qa-row [data-date-status]', 'dateStatus', 'all');
      setActiveButton('#stay-row [data-stay-status]', 'stayStatus', 'all');
      rebuildTopicRow();
      rebuildCountryRow();
      applyFilters();
    }

    const resetFiltersButton = document.getElementById('reset-filters');
    resetFiltersButton.addEventListener('click', (event) => {
      event.stopPropagation();
      resetFilters();
    });
    resetFiltersButton.addEventListener('keydown', (event) => {
      if (event.key !== 'Enter' && event.key !== ' ') return;
      event.preventDefault();
      event.stopPropagation();
      resetFilters();
    });

    function setFiltersOpen(open) {
      const f = document.getElementById('filters');
      if (!f) return;
      f.classList.toggle('open', open);
      document.getElementById('filter-toggle').setAttribute('aria-expanded', open);
    }

    // Mobile toggle
    document.getElementById('filter-toggle').addEventListener('click', () => {
      const f = document.getElementById('filters');
      setFiltersOpen(!f.classList.contains('open'));
    });

    function updateBadge() {
      const count = [activeYear, activeCat, activeRootCat, activeTopic, activeCont, activeRailCont, activeCountry, activeReach, activeImageStatus, activeDateStatus, activeStayStatus].filter(v => v !== 'all').length + (activeSearch ? 1 : 0);
      const badge = document.getElementById('filter-badge');
      badge.textContent = count;
      badge.classList.toggle('visible', count > 0);
    }

    const _applyFilters = applyFilters;
    applyFilters = function() { _applyFilters(); updateBadge(); persistFilterState(); };
    rebuildTopicRow();
    rebuildCountryRow();
    syncFilterControlsFromState();
    initLazyCountryFlagStyles();
    applyFilters();

    function initLocalQaFilters() {
      const localHosts = new Set(['localhost', '127.0.0.1', '::1']);
      if (!localHosts.has(window.location.hostname)) return;

      const mount = document.getElementById('reach-row');
      if (!mount || document.getElementById('qa-row')) return;

      const stayRow = document.createElement('div');
      stayRow.className = 'filter-row';
      stayRow.id = 'stay-row';
      stayRow.innerHTML = [
        '<span class="filter-label">Stay</span>',
        '<button class="filter-btn active" data-stay-status="all">All events</button>',
        '<button class="filter-btn" data-stay-status="has-stay">Has Stay</button>',
        '<button class="filter-btn" data-stay-status="no-stay">No Stay</button>'
      ].join('');
      mount.insertAdjacentElement('afterend', stayRow);

      const row = document.createElement('div');
      row.className = 'filter-row';
      row.id = 'qa-row';
      row.innerHTML = [
        '<span class="filter-label">QA</span>',
        '<button class="filter-btn active" data-image-status="all">All images</button>',
        '<button class="filter-btn" data-image-status="fake">Fake image</button>',
        '<button class="filter-btn" data-image-status="not-fake">Not fake</button>',
        '<button class="filter-btn active" data-date-status="all">All dates</button>',
        '<button class="filter-btn" data-date-status="estimated">Expected date</button>',
        '<button class="filter-btn" data-date-status="unconfirmed">Date not set</button>'
      ].join('');
      stayRow.insertAdjacentElement('afterend', row);

      stayRow.querySelectorAll('[data-stay-status]').forEach(btn => {
        btn.addEventListener('click', () => {
          stayRow.querySelectorAll('[data-stay-status]').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          activeStayStatus = btn.dataset.stayStatus;
          applyFilters();
        });
      });

      row.querySelectorAll('[data-image-status]').forEach(btn => {
        btn.addEventListener('click', () => {
          row.querySelectorAll('[data-image-status]').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          activeImageStatus = btn.dataset.imageStatus;
          applyFilters();
        });
      });

      row.querySelectorAll('[data-date-status]').forEach(btn => {
        btn.addEventListener('click', () => {
          row.querySelectorAll('[data-date-status]').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          activeDateStatus = btn.dataset.dateStatus;
          applyFilters();
        });
      });

      syncFilterControlsFromState();

      fetch('event-stay-flags.json', { cache: 'no-store' })
        .then(response => response.ok ? response.json() : null)
        .then(data => {
          if (!data || !Array.isArray(data.events)) return;
          const normalizePath = (value) => {
            try {
              return new URL(value, window.location.href).pathname;
            } catch (error) {
              return String(value || '').split('#')[0].split('?')[0];
            }
          };
          const byPath = new Map(data.events.map(event => [normalizePath(event.url), event]));
          allCards().forEach(card => {
            const path = normalizePath(card.getAttribute('href'));
            const status = byPath.get(path);
            card.dataset.stay = status && status.hasStay ? 'true' : 'false';
          });
          applyFilters();
        })
        .catch(() => {});

      fetch('event-status-flags.json', { cache: 'no-store' })
        .then(response => response.ok ? response.json() : null)
        .then(data => {
          if (!data || !Array.isArray(data.events)) return;
          const byPath = new Map(data.events.map(event => [event.url, event]));
          allCards().forEach(card => {
            const path = new URL(card.getAttribute('href'), window.location.href).pathname;
            const status = byPath.get(path);
            if (!status) return;
            if (status.imageStatus === 'fake-template') {
              card.dataset.imageStatus = 'fake';
            } else {
              delete card.dataset.imageStatus;
            }
            if (status.officialDateSet === false) {
              card.dataset.officialDate = 'false';
            } else {
              delete card.dataset.officialDate;
            }
            if (status.dateStatus) card.dataset.dateStatus = status.dateStatus;
          });
          applyFilters();
        })
        .catch(() => {});
    }
    initLocalQaFilters();

    // Location toggle
    document.getElementById('location-toggle').addEventListener('click', function() {
      locationOn = !locationOn;
      this.classList.toggle('active', locationOn);
      applyFilters();
    });

    // Level filter
    document.querySelectorAll('#reach-row .filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#reach-row .filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeReach = btn.dataset.reach;
        applyFilters();
      });
    });

    function updateBrowserLanguageLabel() {
      const el = document.getElementById('browser-language-label');
      if (!el) return;
      const lang = (navigator.languages && navigator.languages[0]) || navigator.language || '';
      el.innerHTML = lang ? el.dataset.label + ': <strong>' + lang + '</strong>' : '';
    }
    updateBrowserLanguageLabel();

    // --- Location detection ---
    const contMap = { EU:'europe', NA:'north-america', AS:'asia', OC:'oceania', SA:'south-america', AF:'africa' };
    const countryCodeMap = {
      AR: 'argentina', AU: 'australia', AT: 'austria', BE: 'belgium', BR: 'brazil', CA: 'canada',
      CL: 'chile', CO: 'colombia', EG: 'egypt', FJ: 'fiji', FR: 'france', DE: 'germany',
      IN: 'india', ID: 'indonesia', IE: 'ireland', IT: 'italy', JP: 'japan', KE: 'kenya',
      MW: 'malawi', MX: 'mexico', MC: 'monaco', MA: 'morocco', NZ: 'new-zealand', NG: 'nigeria',
      NO: 'norway', PE: 'peru', QA: 'qatar', RW: 'rwanda', SA: 'saudi-arabia', SG: 'singapore',
      ZA: 'south-africa', KR: 'south-korea', TH: 'thailand', AE: 'united-arab-emirates',
      GB: 'united-kingdom', UK: 'united-kingdom', US: 'usa'
    };

    function titleCaseSlug(value) {
      return (value || '').replace(/-/g, ' ').replace(/\b\w/g, x => x.toUpperCase());
    }

    function updateGeoLabel() {
      const el = document.getElementById('reach-geo-label');
      if (!el) return;
      if (userCountry) {
        el.textContent = countryNames[userCountry] || titleCaseSlug(userCountry);
        return;
      }
      el.textContent = userContinent ? titleCaseSlug(userContinent) : '';
    }

    function setGeo(country, continent, save) {
      userCountry   = country;
      userContinent = continent;
      // Keep a same-continent fallback for the location filter when country is unknown
      tzCountries = new Set(
        Object.values(tzMap)
          .filter(v => v.split(':')[1] === continent)
          .map(v => v.split(':')[0])
      );
      if (save) {
        localStorage.setItem('os_country',   country);
        localStorage.setItem('os_continent', continent);
        localStorage.setItem('os_geo_ts',    Date.now());
        localStorage.setItem('os_geo_v',     '5');
      }
      updateGeoLabel();
      if (locationOn) applyFilters();
    }

    // 1. Immediate: OS timezone - works on file://, no network needed
    (function() {
      const tz    = Intl.DateTimeFormat().resolvedOptions().timeZone || '';
      const entry = tzMap[tz];
      if (entry) { const [c, k] = entry.split(':'); setGeo(c, k, false); }
    })();

    // 2. Refine with localStorage cache (if fresh)
    const cached = localStorage.getItem('os_country');
    const ts     = parseInt(localStorage.getItem('os_geo_ts') || '0');
    if (cached && localStorage.getItem('os_geo_v') === '5' && (Date.now() - ts < 86400000)) {
      setGeo(cached, localStorage.getItem('os_continent') || '', false);
    } else {
      // 3. Refine with IP country lookup (works on GitHub Pages / HTTPS)
      fetch('https://ipapi.co/json/')
        .then(r => r.json())
        .then(d => {
          const country = countryCodeMap[String(d.country_code || d.country || '').toUpperCase()] || '';
          const continent = contMap[d.continent_code] || '';
          if (country || continent) {
            setGeo(country, continent, true);
            return;
          }
          const tz = d.timezone || '';
          const entry = tzMap[tz];
          if (entry) { const [c, k] = entry.split(':'); setGeo(c, k, true); }
        })
        .catch(() => {});
    }

    // --- Build year groups, month sections and card order from card dates ---
    (function() {
      const wrap = document.querySelector('.events-wrap');
      if (!wrap) return;
      const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      const cards = [...wrap.querySelectorAll('.event-card')].sort((a, b) => {
        const da = a.dataset.start || '9999-99-99';
        const db = b.dataset.start || '9999-99-99';
        return da < db ? -1 : da > db ? 1 : 0;
      });
      // Build the year/month structure OFF-DOM first; only commit it if the
      // whole build succeeds. If anything throws, restore every card so the
      // page can never render an empty list.
      const sections = new Map();
      const root = document.createDocumentFragment();
      try {
        cards.forEach(card => {
          const start = card.dataset.start || '9999-99-99';
          const year = start.slice(0, 4);
          const month = start.slice(5, 7);
          const yearKey = /^\d{4}$/.test(year) ? year : 'Other';
          const monthKey = /^\d{2}$/.test(month) ? month : '00';
          if (!sections.has(yearKey)) {
            const yearSection = document.createElement('section');
            yearSection.className = 'year-section';
            yearSection.dataset.yearSection = yearKey;
            yearSection.innerHTML = '<div class="year-header"><button class="year-toggle" type="button" aria-expanded="true">' + yearLabel(yearKey) + '</button><span class="year-line"></span></div><div class="year-months"></div>';
            yearSection.querySelector('.year-toggle').addEventListener('click', () => {
              const collapsed = yearSection.classList.toggle('is-collapsed');
              yearSection.querySelector('.year-toggle').setAttribute('aria-expanded', String(!collapsed));
            });
            sections.set(yearKey, { node: yearSection, months: new Map() });
            root.appendChild(yearSection);
          }
          const yearData = sections.get(yearKey);
          if (!yearData.months.has(monthKey)) {
            const monthSection = document.createElement('section');
            monthSection.className = 'month-section';
            monthSection.id = 'm' + yearKey + monthKey;
            const monthLabel = monthNames[Number(monthKey) - 1] || 'Unscheduled';
            monthSection.innerHTML = '<div class="month-header"><span class="month-title">' + monthLabel + ' ' + yearLabel(yearKey) + '</span><span class="month-line"></span></div><div class="events-grid"></div>';
            yearData.months.set(monthKey, monthSection);
            yearData.node.querySelector('.year-months').appendChild(monthSection);
          }
          yearData.months.get(monthKey).querySelector('.events-grid').appendChild(card);
        });
        wrap.innerHTML = '';
        wrap.appendChild(root);
      } catch (err) {
        try { wrap.innerHTML = ''; } catch (e) {}
        cards.forEach(c => { try { wrap.appendChild(c); } catch (e) {} });
      }
      applyFilters();
    })();
  </script>

</body>
