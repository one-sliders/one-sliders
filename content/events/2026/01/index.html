  <script>
    let activeCat = 'all';
    let activeCont = 'all';
    const allCards = () => [...document.querySelectorAll('.event-card')];
    function matches(card, overrides = {}) {
      const cat = overrides.cat !== undefined ? overrides.cat : activeCat;
      const cont = overrides.cont !== undefined ? overrides.cont : activeCont;
      return (cat === 'all' || card.dataset.cat === cat)
          && (cont === 'all' || card.dataset.cont === cont);
    }
    function applyFilters() {
      allCards().forEach(card => card.classList.toggle('hidden', !matches(card)));
      refreshRows();
    }
    function refreshRows() {
      document.querySelectorAll('#cat-row .filter-btn').forEach(btn => {
        const value = btn.dataset.cat;
        btn.disabled = value !== 'all' && !allCards().some(card => matches(card, { cat: value }));
      });
      document.querySelectorAll('#cont-row .filter-btn').forEach(btn => {
        const value = btn.dataset.cont;
        btn.disabled = value !== 'all' && !allCards().some(card => matches(card, { cont: value }));
      });
    }
    document.querySelectorAll('#cat-row .filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#cat-row .filter-btn').forEach(item => item.classList.remove('active'));
        btn.classList.add('active');
        activeCat = btn.dataset.cat;
        applyFilters();
      });
    });
    document.querySelectorAll('#cont-row .filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#cont-row .filter-btn').forEach(item => item.classList.remove('active'));
        btn.classList.add('active');
        activeCont = btn.dataset.cont;
        applyFilters();
      });
    });
    applyFilters();
  </script>
