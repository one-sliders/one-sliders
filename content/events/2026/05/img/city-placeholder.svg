      <stop offset="0%" stop-color="#0d2137"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
  </defs>
  <!-- background buildings -->
  <rect x="10" y="90" width="18" height="70" fill="#0d1929" opacity="0.7"/>
