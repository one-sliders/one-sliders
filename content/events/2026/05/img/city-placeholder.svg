  <rect x="83" y="84" width="3" height="3" fill="#f0c040" opacity="0.5"/>
  <rect x="144" y="40" width="3" height="3" fill="#80c8ff" opacity="0.7"/>
  <rect x="144" y="52" width="3" height="3" fill="#80c8ff" opacity="0.5"/>
  <rect x="144" y="64" width="3" height="3" fill="#80c8ff" opacity="0.6"/>
  <rect x="203" y="76" width="3" height="3" fill="#f0c040" opacity="0.5"/>
  <rect x="203" y="84" width="3" height="3" fill="#f0c040" opacity="0.6"/>
