  <!-- windows lit up -->
  <rect x="28" y="90" width="3" height="3" fill="#f0c040" opacity="0.6"/>
  <rect x="28" y="96" width="3" height="3" fill="#f0c040" opacity="0.4"/>
  <rect x="33" y="90" width="3" height="3" fill="#f0c040" opacity="0.5"/>
