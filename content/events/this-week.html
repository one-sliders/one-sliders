  <script>
    const embeddedEvents = JSON.parse(document.getElementById('event-data').textContent);
    const params = new URLSearchParams(location.search);
    const dateParam = params.get('date');
    const today = dateParam ? new Date(dateParam + 'T12:00:00') : new Date();
    const dayOffset = (today.getDay() + 6) % 7;
    const weekStart = new Date(today); weekStart.setDate(today.getDate() - dayOffset); weekStart.setHours(0,0,0,0);
    const weekEnd = new Date(weekStart); weekEnd.setDate(weekStart.getDate() + 6); weekEnd.setHours(23,59,59,999);
    const fmt = new Intl.DateTimeFormat('en', { day:'numeric', month:'short', year:'numeric' });
    const isoDate = date => { const copy = new Date(date); copy.setMinutes(copy.getMinutes() - copy.getTimezoneOffset()); return copy.toISOString().slice(0, 10); };
    const sameDay = (a,b) => a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
    const weekHref = offset => { const target = new Date(weekStart); target.setDate(weekStart.getDate() + offset); return 'this-week.html?date=' + isoDate(target); };
    function goWeek(offset){ window.location.href = weekHref(offset); }
    let activeEvents = [];
    const mosaic = document.getElementById('mosaic');
    const emptyState = document.getElementById('empty-state');
    const count = document.getElementById('event-count');
    const getAttr = (node, name) => node.getAttribute(name) || '';
    const parseCards = doc => [...doc.querySelectorAll('.event-card')].map(card => ({
      title: card.querySelector('.card-title')?.textContent?.trim() || '',
      meta: card.querySelector('.card-meta')?.textContent?.replace(/\s+/g,' ').trim() || '',
      href: getAttr(card, 'href'),
      image: card.querySelector('img')?.getAttribute('src') || '',
      start: getAttr(card, 'data-start'),
      end: getAttr(card, 'data-end'),
      cat: getAttr(card, 'data-cat') || 'event',
      topic: getAttr(card, 'data-topic'),
      reach: getAttr(card, 'data-reach')
    })).filter(event => event.title && event.start && event.end && event.href);
    async function loadEvents(){
      try {
        const response = await fetch('index.html', { cache: 'no-store' });
        if (!response.ok) throw new Error('Index fetch failed');
        const doc = new DOMParser().parseFromString(await response.text(), 'text/html');
        const fromIndex = parseCards(doc);
        return fromIndex.length ? fromIndex : embeddedEvents;
      } catch (error) {
        return embeddedEvents;
      }
    }
    const overlaps = event => { const start = new Date(event.start + 'T00:00:00'); const end = new Date(event.end + 'T23:59:59'); return start <= weekEnd && end >= weekStart; };
    function dateLabel(event){ if (!event.start || !event.end) return 'Dates TBC'; const start = new Date(event.start + 'T00:00:00'); const end = new Date(event.end + 'T00:00:00'); return sameDay(start,end) ? fmt.format(start) : fmt.format(start) + ' - ' + fmt.format(end); }
    function eventStatus(event){
      const start = new Date(event.start + 'T00:00:00');
      const end = new Date(event.end + 'T23:59:59');
      const now = new Date();
      if (now < start) return { key: 'upcoming', label: 'Not started' };
      if (now > end) return { key: 'ended', label: 'Ended' };
      return { key: 'ongoing', label: 'Ongoing' };
    }
    function heroImage(image){ return image.replace(/-mini\.png$/, '-hero.png'); }
    function eventLink(event){ const base = event.href.replace(/#.*$/, ''); return base + '#parts'; }
    function layoutClass(total){ const capped = Math.min(Math.max(total, 0), 20); return capped >= 10 ? 'mosaic mosaic--fit mosaic--count-' + capped : 'mosaic mosaic--count-' + capped; }
    function createTile(event, index, total){ const compact = total >= 10; const isWide = !compact && index > 6; const isFeature = compact ? false : index < 3 || isWide; const tile = document.createElement('a'); tile.className = 'event-tile' + (isFeature ? ' event-tile--feature' : '') + (isWide ? ' event-tile--wide' : ''); tile.href = eventLink(event); tile.dataset.cat = event.cat; const img = document.createElement('img'); img.src = isFeature ? heroImage(event.image) : event.image; img.dataset.fallback = event.image; img.onerror = () => { if (img.src !== img.dataset.fallback) img.src = img.dataset.fallback; }; img.alt = ''; img.loading = 'lazy'; const meta = document.createElement('span'); meta.className = 'event-meta'; meta.textContent = (event.cat || 'event').replace('-', ' '); const date = document.createElement('span'); date.className = 'event-date'; date.textContent = dateLabel(event); const statusData = eventStatus(event); const status = document.createElement('span'); status.className = 'event-status event-status--' + statusData.key; status.innerHTML = '<span class="event-status__dot" aria-hidden="true"></span><span>' + statusData.label + '</span>'; const name = document.createElement('div'); name.className = 'event-name'; name.textContent = event.title; tile.append(img, meta, status, date, name); return tile; }
    let currentCat = 'all';
    let activeOnly = false;
    function render(){
      const now = new Date();
      let list = currentCat === 'all' ? activeEvents : activeEvents.filter(event => event.cat === currentCat);
      if (activeOnly) {
        list = list.filter(event => {
          const start = new Date(event.start + 'T00:00:00');
          const end   = new Date(event.end   + 'T23:59:59');
          return start <= now && end >= now;
        });
      }
      mosaic.className = layoutClass(list.length);
      mosaic.replaceChildren(...list.map((event, index) => createTile(event, index, list.length)));
      emptyState.classList.toggle('visible', list.length === 0);
      count.textContent = list.length + ' shown';
    }
    (() => {
      const bar = document.getElementById('filter-bar');
      const toggle = document.getElementById('filter-toggle');
      const label = document.getElementById('filter-toggle-label');
      const activeBtn = document.getElementById('active-only-toggle');
      const catButtons = bar.querySelectorAll('.filter-panel button[data-filter]');
      function open()  { bar.classList.add('open');    toggle.setAttribute('aria-expanded', 'true'); }
      function close() { bar.classList.remove('open'); toggle.setAttribute('aria-expanded', 'false'); }
      function updateToggleLabel() {
        const catName = currentCat === 'all' ? 'All categories'
          : [...catButtons].find(b => b.dataset.filter === currentCat).firstChild.textContent.trim();
        label.textContent = activeOnly ? catName + ' · active now' : catName;
        toggle.classList.toggle('has-active', currentCat !== 'all' || activeOnly);
      }
      toggle.addEventListener('click', () => bar.classList.contains('open') ? close() : open());
      document.addEventListener('click', e => { if (!bar.contains(e.target)) close(); });
      document.addEventListener('keydown', e => { if (e.key === 'Escape') close(); });
      activeBtn.addEventListener('click', () => {
        activeOnly = !activeOnly;
        activeBtn.setAttribute('aria-checked', activeOnly ? 'true' : 'false');
        updateToggleLabel();
        render();
      });
      catButtons.forEach(btn => btn.addEventListener('click', () => {
        catButtons.forEach(b => { b.classList.remove('active'); b.setAttribute('aria-checked', 'false'); });
        btn.classList.add('active'); btn.setAttribute('aria-checked', 'true');
        currentCat = btn.dataset.filter;
        updateToggleLabel();
        render();
        close();
      }));
    })();
    document.addEventListener('keydown', event => {
      if (event.defaultPrevented || event.altKey || event.ctrlKey || event.metaKey || event.shiftKey) return;
      if (event.key === 'ArrowLeft') { event.preventDefault(); goWeek(-7); }
      if (event.key === 'ArrowRight') { event.preventDefault(); goWeek(7); }
    });
    let touchStartX = null;
    document.addEventListener('touchstart', event => { touchStartX = event.touches[0]?.clientX ?? null; }, { passive: true });
    document.addEventListener('touchend', event => {
      if (touchStartX === null) return;
      const delta = (event.changedTouches[0]?.clientX ?? touchStartX) - touchStartX;
      touchStartX = null;
      if (Math.abs(delta) < 70) return;
      goWeek(delta > 0 ? -7 : 7);
    }, { passive: true });
    loadEvents().then(allEvents => {
      activeEvents = allEvents.filter(overlaps).sort((a,b) => a.start.localeCompare(b.start) || a.title.localeCompare(b.title));
      const thisWeek = new Date(); thisWeek.setHours(12,0,0,0);
      const currentDayOffset = (thisWeek.getDay() + 6) % 7;
      const currentWeekStart = new Date(thisWeek); currentWeekStart.setDate(thisWeek.getDate() - currentDayOffset); currentWeekStart.setHours(0,0,0,0);
      // Nav buttons step ±7 days relative to the VIEWED week (matches swipe).
      // Labels show actual date ranges so the user always knows where they are.
      const prevWeek = new Date(weekStart); prevWeek.setDate(weekStart.getDate() - 7);
      const nextWeek = new Date(weekStart); nextWeek.setDate(weekStart.getDate() + 7);
      const dayMonthFmt = new Intl.DateTimeFormat('en', { day:'numeric', month:'short' });
      function rangeLabel(start) {
        const end = new Date(start); end.setDate(start.getDate() + 6);
        return start.getMonth() === end.getMonth()
          ? dayMonthFmt.format(start) + '-' + end.getDate()
          : dayMonthFmt.format(start) + ' - ' + dayMonthFmt.format(end);
      }
      const prevLink = document.getElementById('prev-week-link');
      const thisLink = document.getElementById('this-week-link');
      const nextLink = document.getElementById('next-week-link');
      const currentKey  = isoDate(currentWeekStart);
      const selectedKey = isoDate(weekStart);

      prevLink.textContent = '‹ ' + rangeLabel(prevWeek);
      prevLink.href = 'this-week.html?date=' + isoDate(prevWeek);
      prevLink.classList.toggle('active', currentKey === isoDate(prevWeek));

      thisLink.textContent = rangeLabel(weekStart) + (selectedKey === currentKey ? ' · today' : '');
      thisLink.href = 'this-week.html?date=' + isoDate(weekStart);
      thisLink.classList.add('active');

      nextLink.textContent = rangeLabel(nextWeek) + ' ›';
      nextLink.href = 'this-week.html?date=' + isoDate(nextWeek);
      nextLink.classList.toggle('active', currentKey === isoDate(nextWeek));

      // Add (or remove) a small "↺ Today" reset link when off-week
      const nav = document.querySelector('.week-nav');
      let todayLink = document.getElementById('today-week-link');
      if (selectedKey !== currentKey) {
        if (!todayLink) {
          todayLink = document.createElement('a');
          todayLink.id = 'today-week-link';
          todayLink.className = 'today-link';
          todayLink.textContent = '↺ Today';
          nav.appendChild(todayLink);
        }
        todayLink.href = 'this-week.html?date=' + currentKey;
      } else if (todayLink) {
        todayLink.remove();
      }

      // Header card: distinguish "This week" vs viewed week
      const weeksAway = Math.round((weekStart - currentWeekStart) / 86400000 / 7);
      const titleText = weeksAway === 0 ? 'This week'
                      : weeksAway === 1 ? 'Next week'
                      : weeksAway === -1 ? 'Last week'
                      : weeksAway > 0 ? '+' + weeksAway + ' weeks ahead'
                      : weeksAway + ' weeks ago';
      const eventsText = activeEvents.length + ' active event' + (activeEvents.length === 1 ? '' : 's');
      document.getElementById('week-title').textContent = titleText + ' · ' + eventsText;
      document.getElementById('week-range').textContent = fmt.format(weekStart) + ' - ' + fmt.format(weekEnd);
      render();
    });
  </script>
</body>
</html>
