<!doctype html>
<html lang="en">
<head>
  <!-- OneSlider core v4 -->
  <link rel="stylesheet" href="../../../../assets/css/oneslider-core.css">
  <script defer src="../../../../assets/js/oneslider-core.js?v={{CORE_VERSION}}"></script>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="index,follow">
  <meta name="description" content="{{DESCRIPTION}}">
  <meta property="og:type" content="website">
  <meta property="og:title" content="{{TITLE}}">
  <meta property="og:description" content="{{DESCRIPTION}}">
  <meta property="og:image" content="{{OG_IMAGE}}">
  <meta property="og:url" content="{{PAGE_URL}}">
  <link rel="canonical" href="{{PAGE_URL}}">
  <link rel="icon" href="../../../../assets/icons/favicon.ico" sizes="any">
  <link rel="icon" href="../../../../assets/icons/one-sliders-icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="../../../../assets/icons/apple-touch-icon.png">
  <link rel="manifest" href="../../../../assets/icons/site.webmanifest">
  <link rel="preload" as="image" href="{{HERO_PRELOAD}}">
  <link rel="stylesheet" href="../../../../assets/css/locations.css?v={{CSS_VERSION}}">
  <title>{{TITLE}}</title>
  <script type="application/ld+json">{{JSON_LD}}</script>
</head>
<body class="{{BODY_CLASS}}">
  {{NAV}}
  <main class="page-shell country-slide country-content-box">
    <section class="country-brief" aria-label="{{CITY_NAME}} one-slide overview">
      <div class="country-brief__copy">
        {{HERO_PICTURE}}
        <p class="kicker">{{KICKER}}</p>
        <h1 class="hero-title">{{CITY_NAME}}</h1>
        {{FACTS}}
        {{WEATHER}}
        <p class="hero-text">{{HERO_TEXT}}</p>
        <div class="destination-experience-grid">{{EXPERIENCE_CARDS}}</div>
        <div class="country-left-stack">
          {{CITY_SNAPSHOT}}
          {{PARENT_CARD}}
        </div>
      </div>
      <div class="country-brief__panel">
        <section class="persona-tabs" aria-label="Choose {{CITY_NAME}} view">
          <input type="radio" name="{{CITY_SLUG}}-view" id="view-visit" checked>
          <input type="radio" name="{{CITY_SLUG}}-view" id="view-see">
          <input type="radio" name="{{CITY_SLUG}}-view" id="view-stay">
          <input type="radio" name="{{CITY_SLUG}}-view" id="view-nearby">
          <input type="radio" name="{{CITY_SLUG}}-view" id="view-events">
          <input type="radio" name="{{CITY_SLUG}}-view" id="view-context">
          <div class="persona-tablist" role="tablist" aria-label="Choose {{CITY_NAME}} outcome">
            <label for="view-visit" role="tab">Plan</label>
            <label for="view-see" role="tab">See</label>
            <label for="view-stay" role="tab">Visit</label>
            <label for="view-nearby" role="tab">Nearby</label>
            <label for="view-events" role="tab">Events</label>
            <label for="view-context" role="tab">Highlights</label>
          </div>
          <div class="persona-panel view-panel--visit">{{PLAN_PANEL}}</div>
          <div class="persona-panel view-panel--see">{{SEE_PANEL}}</div>
          <div class="persona-panel view-panel--stay">{{STAY_PANEL}}</div>
          <div class="persona-panel view-panel--nearby">{{NEARBY_PANEL}}</div>
          <div class="persona-panel view-panel--events">{{EVENTS_PANEL}}</div>
          <div class="persona-panel view-panel--context">{{HIGHLIGHTS_PANEL}}</div>
        </section>
      </div>
    </section>
  </main>
</body>
</html>
